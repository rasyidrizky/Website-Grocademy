version: "3.9"

services:
  db:
    image: postgres:16
    container_name: grocademy-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: Witherboss
      POSTGRES_DB: grocademy
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: unless-stopped

  app:
    build: .
    container_name: grocademy-app
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    depends_on:
      - db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: Witherboss
      POSTGRES_DB: grocademy
      POSTGRES_HOST: db
    restart: unless-stopped

volumes:
  postgres_data:
