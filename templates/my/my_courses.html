{% extends "base.html" %}
{% block title %}My Courses{% endblock %}
{% block content %}
<h1>My Courses</h1>
<ul>
  {% for c in courses %}
    <li>
      <a href="/courses/{{ c.id }}/modules/">{{ c.title }}</a> 
      — Progress: {{ c.progress_percentage }}% 
      — Dibeli: {{ c.purchased_at }}
    </li>
  {% empty %}
    <li>Belum ada course</li>
  {% endfor %}
</ul>
{% endblock %}
