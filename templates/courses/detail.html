{% extends "base.html" %}
{% block title %}{{ course.title }}{% endblock %}
{% block content %}
<h1>{{ course.title }}</h1>
<p>{{ course.description }}</p>
<h3>Modules</h3>
<ol>
  {% for m in course.modules.all %}<li>{{ m.title }}</li>{% endfor %}
</ol>

<form method="post" action="/buy/">{% csrf_token %}
  <input type="hidden" name="course_id" value="{{ course.id }}">
  <button type="submit">Buy Course</button>
</form>
{% endblock %}
